<!doctype html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <link
      rel="stylesheet"
      href="https://noterook.net/static/css/noterook.css"
    />
    <link rel="stylesheet" href="./editorInner.css" />
    <link rel="stylesheet" href="./themes.css" />
  </head>
  <body>
    <main>
      <header></header>
      <div class="composer-wrapper">
        <div class="tf-composer">
          <div id="editor-header" class="composer-header">
            <h2>Markdown</h2>
          </div>
          <div id="composer"></div>
        </div>
        <div class="tf-composer">
          <div class="composer-header">
            <h2>CSS</h2>
          </div>
          <div id="css-composer"></div>
        </div>
      </div>
      <footer class="tf-composer-controls">
        <input
          id="composer-tags"
          type="text"
          class="composer-tags-input"
          placeholder="Tags (comma-separated)"
          maxlength="500"
        />
        <div class="composer-options">
          <label class="composer-checkbox-label" for="composer-hide-search">
            <input type="checkbox" id="composer-hide-search" />
            Book only
          </label>
          <label class="composer-checkbox-label" for="ask-anonymous">
            <input type="checkbox" id="ask-anonymous" />
            Send anonymously
          </label>
          <label
            class="composer-checkbox-label"
            title="Publish at a future time. The post stays hidden from everyone but you until then, then appears on its own. (Needs your blob to stay alive until then - don't schedule and go dark past your book's lifespan.)"
            for="composer-schedule-toggle"
          >
            <input type="checkbox" id="composer-schedule-toggle" />
            Schedule
          </label>
          <input
            type="datetime-local"
            id="composer-schedule-at"
            class="composer-schedule-input"
            style="display: none"
            title="When to publish"
          />
          <span
            class="composer-schedule-hint"
            id="composer-schedule-hint"
            style="display: none"
          ></span>
          <div class="composer-char-count" id="composer-char-count">
            0 / 100,000
          </div>
        </div>
        <div class="composer-buttons">
          <button
            type="button"
            id="composer-drafts-btn"
            class="btn-secondary composer-btn"
            title="Saved drafts (this device only)"
          >
            Drafts
          </button>
          <button
            type="button"
            id="composer-save-draft"
            class="btn-secondary composer-btn"
            title="Save as a local draft (not published)"
          >
            Save draft
          </button>
          <button
            type="button"
            id="composer-queue-btn"
            class="btn-secondary composer-btn"
            title="Add to your queue - publishes automatically at the next drip slot"
          >
            Queue
          </button>
          <button
            type="button"
            id="composer-submit"
            class="btn-primary composer-btn"
          >
            Post
          </button>
        </div>
        <div
          class="composer-drafts-panel"
          id="composer-drafts-panel"
          style="display: none"
        >
          <div class="composer-drafts-empty">
            No saved drafts on this device.
          </div>
        </div>
      </footer>
    </main>
    <aside id="tf-preview"></aside>
    <script src="../lib/marked.min.js"></script>
    <script src="../lib/purify.min.js"></script>
    <script src="../lib/culori.min.js"></script>
    <script src="../lib/src-min-noconflict/ace.js"></script>
    <script type="module" src="./editorConfig.js"></script>
  </body>
</html>
